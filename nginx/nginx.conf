# NGINX reverse proxy configuration
#
# Default mode: plain HTTP reverse proxy to the FastAPI app.
# This works immediately even without a domain name (access via server IP).
#
# To enable HTTPS once you have a real domain pointed at this server:
#   1. Set DOMAIN_NAME and ADMIN_EMAIL in your .env
#   2. Run: docker compose run --rm certbot certonly --webroot \
#        -w /var/www/certbot -d ${DOMAIN_NAME} --email ${ADMIN_EMAIL} --agree-tos
#   3. Uncomment the HTTPS server block below and replace example.com with
#      your real domain.
#   4. docker compose up -d --force-recreate nginx
#   5. Start the certbot renewal sidecar: docker compose --profile ssl up -d certbot
#
# See docs/DEPLOYMENT.md for the no-domain fallback (self-signed cert).

# Basic rate limiting to slow down brute-force / abuse
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    # Required for Let's Encrypt HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /health {
        proxy_pass http://app:8000/health;
        access_log off;
    }

    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Sane timeouts so a slow/dead upstream doesn't hold connections forever
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Hide NGINX version banner
    server_tokens off;
}

