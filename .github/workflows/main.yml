name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_latest: ${{ steps.meta.outputs.latest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase repository name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set image tag
        id: meta
        run: |
          echo "tag=ghcr.io/${{ steps.repo.outputs.name }}/app:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "latest=ghcr.io/${{ steps.repo.outputs.name }}/app:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            # Pull the latest code (docker-compose.yml, nginx config, etc.)
            git pull origin main

            # Log in to GHCR on the server and pull the freshly built image
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ needs.build-and-push.outputs.image_tag }}
            docker tag ${{ needs.build-and-push.outputs.image_tag }} devops-assignment-app:latest

            # Zero-downtime-ish rolling update: bring up new container,
            # wait for health check, then remove the old one.
            docker compose up -d --no-deps --no-build app
            docker compose up -d nginx db redis

            # Clean up old dangling images so disk doesn't fill up
            docker image prune -f

      - name: Verify deployment health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            sleep 5
            curl -f http://localhost/health || (echo "Health check failed!" && exit 1)

# ---------------------------------------------------------------------------
# Required GitHub secrets (Settings -> Secrets and variables -> Actions):
#   VPS_HOST          - server IP or hostname
#   VPS_USER           - SSH user (non-root, e.g. "deployer")
#   VPS_SSH_KEY         - private key matching a public key in ~/.ssh/authorized_keys on the server
#   VPS_PORT           - SSH port (e.g. 22 or a custom hardened port)
#   VPS_DEPLOY_PATH     - absolute path to the repo clone on the server, e.g. /opt/devops-assignment
#   GHCR_TOKEN         - a GitHub PAT (or GITHUB_TOKEN) with read:packages scope, for the server to pull images
# ---------------------------------------------------------------------------
